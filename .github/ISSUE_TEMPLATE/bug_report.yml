name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Start the Mac agent
        2. Open the Samsung phone app
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "Example: macOS 15.x"
  - type: input
    id: android
    attributes:
      label: Samsung phone and Android version
      placeholder: "Example: Galaxy S24 Ultra, Android 15"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove private information before uploading.
