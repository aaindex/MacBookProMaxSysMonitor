<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mac Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090b;
      --panel: #13161b;
      --panel-2: #191e25;
      --text: #f4f6fb;
      --muted: #98a2b3;
      --line: #2a3039;
      --green: #3ddc97;
      --blue: #5aa7ff;
      --amber: #ffbe55;
      --red: #ff6673;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font: 15px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { padding: max(18px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom)); }
    main { max-width: 820px; margin: 0 auto; }
    header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    h1 { margin: 0; font-size: 29px; letter-spacing: 0; line-height: 1; }
    .sub { color: var(--muted); margin-top: 7px; }
    .status { min-width: 84px; text-align: right; color: var(--green); font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .card { background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid var(--line); border-radius: 8px; padding: 13px; min-height: 126px; }
    .wide { grid-column: 1 / -1; }
    .label { display: flex; justify-content: space-between; color: var(--muted); font-weight: 650; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; }
    .value { margin-top: 10px; font-size: 34px; font-weight: 800; letter-spacing: 0; }
    .small { color: var(--muted); margin-top: 4px; }
    .bar { height: 9px; background: #252b34; border-radius: 999px; overflow: hidden; margin-top: 14px; }
    .fill { height: 100%; width: 0%; border-radius: inherit; background: var(--green); transition: width .25s ease, background .25s ease; }
    .row { display: flex; justify-content: space-between; gap: 10px; border-top: 1px solid var(--line); padding-top: 9px; margin-top: 9px; color: var(--muted); }
    .row strong { color: var(--text); font-weight: 700; }
    .process { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--line); }
    .process:last-child { border-bottom: 0; }
    .footer { margin-top: 12px; color: var(--muted); font-size: 12px; text-align: center; }
    @media (max-width: 430px) {
      body { padding-left: 10px; padding-right: 10px; }
      .grid { gap: 8px; }
      .card { padding: 11px; min-height: 116px; }
      .value { font-size: 29px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Mac Monitor</h1>
      <div class="sub"><span id="host">MacBook</span> · <span id="time">--:--</span></div>
    </div>
    <div class="status" id="status">LIVE</div>
  </header>

  <section class="grid">
    <article class="card">
      <div class="label"><span>CPU</span><span id="cores">-- cores</span></div>
      <div class="value" id="cpu">--%</div>
      <div class="small" id="load">Load --</div>
      <div class="bar"><div class="fill" id="cpuBar"></div></div>
    </article>

    <article class="card">
      <div class="label"><span>Memory Pressure</span><span id="ramText">-- / --</span></div>
      <div class="value" id="ram">--%</div>
      <div class="small">App, wired, compressed</div>
      <div class="bar"><div class="fill" id="ramBar"></div></div>
    </article>

    <article class="card">
      <div class="label"><span>Disk</span><span id="diskText">-- / --</span></div>
      <div class="value" id="disk">--%</div>
      <div class="small">System volume</div>
      <div class="bar"><div class="fill" id="diskBar"></div></div>
    </article>

    <article class="card">
      <div class="label"><span>GPU</span><span>Apple Silicon</span></div>
      <div class="value" id="gpu">Active</div>
      <div class="small" id="gpuModel">--</div>
      <div class="small" id="gpuNote"></div>
    </article>

    <article class="card wide">
      <div class="label"><span>Network Totals</span><span>Since Boot</span></div>
      <div class="row"><span>Received</span><strong id="rx">--</strong></div>
      <div class="row"><span>Sent</span><strong id="tx">--</strong></div>
    </article>

    <article class="card wide">
      <div class="label"><span>Top CPU Processes</span><span>% CPU</span></div>
      <div id="top"></div>
    </article>
  </section>
  <div class="footer">Updates every 2 seconds through USB debugging.</div>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  function color(p) {
    if (p >= 90) return "var(--red)";
    if (p >= 70) return "var(--amber)";
    if (p >= 45) return "var(--blue)";
    return "var(--green)";
  }
  function pct(id, barId, value) {
    const rounded = Number(value || 0).toFixed(1);
    $(id).textContent = `${rounded}%`;
    $(barId).style.width = `${Math.max(0, Math.min(100, value || 0))}%`;
    $(barId).style.background = color(value || 0);
  }
  async function refresh() {
    try {
      const res = await fetch("/api/metrics", { cache: "no-store" });
      const m = await res.json();
      $("status").textContent = "LIVE";
      $("status").style.color = "var(--green)";
      $("host").textContent = m.host;
      $("time").textContent = m.time;
      $("cores").textContent = `${m.cpu.cores} cores`;
      pct("cpu", "cpuBar", m.cpu.percent);
      $("load").textContent = `Load ${m.cpu.load.join(" / ")}`;
      pct("ram", "ramBar", m.memory.percent);
      $("ramText").textContent = `${m.memory.usedText} / ${m.memory.totalText}`;
      pct("disk", "diskBar", m.disk.percent);
      $("diskText").textContent = `${m.disk.usedText} / ${m.disk.totalText}`;
      $("gpu").textContent = m.gpu.status;
      $("gpuModel").textContent = m.gpu.model;
      $("gpuNote").textContent = m.gpu.note;
      $("rx").textContent = m.network.rxText;
      $("tx").textContent = m.network.txText;
      $("top").innerHTML = m.cpu.top.map(p =>
        `<div class="process"><span>${p.name}</span><strong>${p.cpu.toFixed(1)}</strong></div>`
      ).join("");
    } catch (err) {
      $("status").textContent = "OFFLINE";
      $("status").style.color = "var(--red)";
    }
  }
  refresh();
  setInterval(refresh, 2000);
</script>
</body>
</html>
